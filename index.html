    <header onclick="processData()">

    <main>
        <h1 style="margin-top: 17vh;text-align: center;margin-bottom:5px; ">השוואת תשואות קופות גמל</h1>
        <div id="tkofatdivuachn"></div>
       <div class="klali muzar" id="sughash">
                <label class="lblblack" id="sug">בחר סוג השוואה:</label>
                <div id="movililm">    
                    <input type="radio" class="rdbutton" id="rdbutton1" name="sughash" onchange="changek()" checked>
                    <label for="rdbutton1"> כוללת: ברמת מסלול  </label>
                </div>
                <div  id="speci">
                    <input type="radio" class="rdbutton" id="rdbutton2" name="sughash" onchange="changek()">
                    <label for="rdbutton2"> ספציפית: בין שני מסלולים </label>
                </div>
                <div  id="hashmozar">
                    <input type="radio" class="rdbutton" id="rdbutton3" name="sughash" onchange="changek()">
                    <label for="rdbutton3"> כוללת: רמת מוצר </label>
                </div>
        </div>

        <div class="klali muzar" id="tkufa">
                <label class="lblblack" id="sug">בחר תקופת השוואה:</label>
                <div id="divone">    
                    <input type="radio" class="rdbutton" id="one" name="tkufahash" onchange="changek()" checked>
                    <label for="rdbutton1"> 12 חודשים    </label>
                </div>
                <div  id="divthree">
                    <input type="radio" class="rdbutton" id="three" name="tkufahash" onchange="changek()">
                    <label for="rdbutton2"> 3 שנים </label>
                </div>
                <div  id="divfive">
                    <input type="radio" class="rdbutton" id="five" name="tkufahash" onchange="changek()">
                    <label for="rdbutton3"> 5 שנים </label>
                </div>
      </div>
        
      <div class="klali">
            <div class="muzar">
                <label class="lblblack" for="product" id="lblproduct">בחר מוצר:</label>
                <select id="product" name="product" onchange="rashiadd()" required>  </select>
            </div>
            <div class="maslul muzar" id="maslul">
                <label class="lblblack" for="maslul-type">בחר מסלול:</label>
                <select id="maslul-type" name="maslul-type" required placeholder="בחר" onchange="specificadd()" >
                    <option value="" disabled selected >בחר</option>
                </select>
            </div>
        </div>
      
       
        <div class="hashspecific" id="hashspecific">
           <div class="maslul muzar" id="maslul1">

                <select id="maslul-type1" name="maslul-type1" required placeholder="בחר" onchange="changek()" >
                    <option value="" disabled selected>בחר</option>

            </div>

            <div class="maslul muzar" id="maslul2">

                <select id="maslul-type2" name="maslul-type2" required placeholder="בחר" onchange="changek()" >

                </select>
            </div>
        </div>  
        <button class="bazea" onclick="bring()">בצע השוואה</button><br>

                    </tr>
                    <tr>
                        <td id="outputmh2" class="tdsmall"></td>
                        <th id="thb2" onclick="bringinfo(this)"> </th>
                        <td id="output2" class="tdbig"></td>

                  </table>
        </div>
        <div class="table3" id="table3">

                        <td id="output11" class="tdbig"></td>

                    <tr>

        </div>
        <div class="table5" id="table5">
